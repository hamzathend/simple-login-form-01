<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form | Simple</title>
    <style>
        body {
            display: flex;
            /* max-width: 50%; */
            margin: 200px auto;
            /* align-items: center; */
            justify-content: center;
        }
        #container {
            border: 1px solid green;
            padding: 50px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 10px 5px 5px;
        }
        .login-form-title {
            font-weight: 600;
            color: rgba(38, 136, 38, 0.788);
        }
        .login-form-caption {
            font-weight: 500;
            font-size: medium;
        }
        label {
            font-weight: 600;
        }
       input[type=button] {
        width: 50%;
        border: transparent;
        background-color: rgba(38, 136, 38, 0.788);
        padding: 5px;
        color: white;
        border-radius: 10px;
       }
       input[type=button]:hover {
        border: 1px solid rgba(38, 136, 38, 0.788);
        color: rgba(38, 136, 38, 0.788);
        background-color: white;
       }

       input[type=email], [type=password] {
        width: 100%;
        border: 1px solid black;
        border-radius: 5px;
        text-align: center;
        height: 25px;
       }

    </style>
</head>
<body>
    <div id="container">
        <h2 class="login-form-title">
            Simple Login Form
        </h2>
        <h3 class="login-form-caption">
            Enter your login credentials
        </h3>
        <form>
            <label for="username">Username:</label>
            <br>
            <input type="email" name="username" id="username" placeholder="Enter your username or email">
            <br><br>
            <label for="password">Password:</label>
            <br>
            <input type="password" name="password" id="password" placeholder="Enter your password">
            <br><br>
            <input type="button" value="Login">
            <br><br><br>
            <p>Not Registered? <a href="#" target="_blank">Create an account.</a></p>
        </form>
    </div>
</body>
</html>
